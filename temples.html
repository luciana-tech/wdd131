<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Album</title>
    <meta name="description" content="Temple Album showcasing LDS temples in Brazil">
    <meta name="author" content="Luciana Oliveira">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin type="text/css">

    <!-- CSS files -->
    <link rel="stylesheet" type="text/css" href="styles/temples.css">

    <header>
        <h1>Temple Album</h1>
        <button id="menu" aria-label="Menu">☰</button>

            <figure>

                <figcaption>Natal Brazil Temple</figcaption>

    <footer>
        <p>&copy; <span id="currentyear"></span> Luciana Oliveira | Brazil</p>
