<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Luciana Oliveira">
    <meta name="description" content="Review confirmation page - Thank you for your feedback">
    <title>The Right City | Review Submitted</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
</head>
<body>
    <main class="container">
        <div class="form-card review-card">
            <div class="success-icon">✅</div>
            <h1>Thank You for Your Review!</h1>
            <h2>Your feedback helps us improve</h2>
            
            <div class="review-stats">
                <p>Total Reviews Submitted</p>
                <div class="counter" id="reviewCount">0</div>
                <p>⭐ Your voice matters to us ⭐</p>
            </div>
            
            <p>We appreciate you taking the time to share your experience with our products.</p>
            <p>Your review has been recorded successfully.</p>
            
            <a href="form.html" class="btn-back">📝 Write Another Review</a>
        </div>
    </main>
    
    <footer>
        <p>&copy; <span id="currentyear"></span> Luciana Oliveira | Brazil</p>
        <p id="lastModified"></p>
    </footer>
    
    <script src="scripts/form.js"></script>
</body>
</html>
