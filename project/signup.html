<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Luciana Oliveira">
    <meta name="description" content="Sign up to receive personalized city recommendations delivered to your email. Find your dream city in Brazil.">
    <meta name="keywords" content="sign up, city recommendations, Brazil cities">
    <title>The Right City | Sign Up</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link rel="stylesheet" href="styles/theright-city.css">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    </noscript>
    
    <script src="scripts/theright-city.js" defer></script>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo" aria-label="The Right City Home">
                <span aria-hidden="true">🏙️</span> The Right City
            </a>
            <nav class="nav-links" aria-label="Main navigation">
                <a href="index.html">Home</a>
                <a href="ranking.html">Ranking</a>
                <a href="signup.html" aria-current="page">Sign Up</a>
            </nav>
        </div>
    </header>

    <main class="container" id="main-content">
        <div class="form-container">
            <h1>📬 Get Your Dream City</h1>
            <p class="form-subtitle">Sign up to receive personalized recommendations.</p>
            <div id="successMessage" class="success-message" role="status" aria-live="polite"></div>
            <form id="signupForm" class="signup-form" method="post" novalidate>
                <div class="form-group">
                    <label for="userName" class="required-label">Full Name</label>
                    <input type="text" id="userName" name="userName" required aria-required="true" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="userEmail" class="required-label">Email Address</label>
                    <input type="email" id="userEmail" name="userEmail" required aria-required="true" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="preferredRegion" class="required-label">Preferred Region</label>
                    <select id="preferredRegion" name="preferredRegion" required aria-required="true">
                        <option value="">Select region</option>
                        <option value="south">South (PR, SC, RS)</option>
                        <option value="southeast">Southeast (SP, RJ, MG, ES)</option>
                        <option value="central-west">Central-West (DF, GO, MT, MS)</option>
                        <option value="northeast">Northeast (BA, PE, CE)</option>
                        <option value="north">North (AM, PA)</option>
                    </select>
                </div>
                <fieldset class="form-group">
                    <legend class="required-label">Priority Preference</legend>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="priority" value="quality" required aria-required="true"> Quality of Life
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="priority" value="costBenefit"> Cost-Benefit
                        </label>
                    </div>
                </fieldset>
                <button type="submit" class="btn btn-primary submit-btn" aria-label="Sign up for recommendations">🔔 Sign Up</button>
            </form>
            <p class="form-footer-note">We respect your privacy. Unsubscribe at any time.</p>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> Luciana Oliveira | Brazil</p>
        <p><a href="attribution.html">Image Attributions &amp; Data Sources</a></p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
